<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { margin-bottom: 30px; color: #7BCC87; }
        .section {
            background: #1a1a1a;
            border: 1px solid #2C2B2B;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section h2 { color: #7BCC87; margin-bottom: 15px; font-size: 18px; }
        input, button {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #2C2B2B;
            background: #212121;
            color: #fff;
            font-size: 14px;
        }
        input { margin-right: 10px; width: 200px; }
        button {
            background: #7BCC87;
            color: #0a0a0a;
            cursor: pointer;
            font-weight: 600;
            border: none;
        }
        button:hover { opacity: 0.9; }
        button.danger { background: #D93025; color: #fff; }
        .result {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
        .result.success { background: rgba(123, 204, 135, 0.2); border: 1px solid #7BCC87; }
        .result.error { background: rgba(217, 48, 37, 0.2); border: 1px solid #D93025; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #2C2B2B;
        }
        th { color: #7BCC87; font-weight: 600; }
        .status-banned { color: #D93025; }
        .status-active { color: #7BCC87; }
        .actions button { margin-right: 5px; padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Админ-панель лоадера</h1>

        <!-- Сброс HWID -->
        <div class="section">
            <h2>Сброс HWID</h2>
            <input type="text" id="resetUsername" placeholder="Username">
            <input type="password" id="adminKey" placeholder="Admin Key">
            <button onclick="resetHWID()">Сбросить HWID</button>
            <div id="resetResult" class="result"></div>
        </div>

        <!-- Управление баном -->
        <div class="section">
            <h2>Управление баном</h2>
            <input type="text" id="banUsername" placeholder="Username">
            <button onclick="banUser()">Забанить</button>
            <button onclick="unbanUser()" class="danger">Разбанить</button>
            <div id="banResult" class="result"></div>
        </div>

        <!-- Управление подпиской -->
        <div class="section">
            <h2>Управление подпиской</h2>
            <input type="text" id="subUsername" placeholder="Username">
            <input type="number" id="subDays" placeholder="Дней" value="30" style="width: 100px;">
            <button onclick="addSubscription()">Добавить подписку</button>
            <button onclick="removeSubscription()" class="danger">Удалить подписку</button>
            <div id="subResult" class="result"></div>
        </div>

        <!-- Список пользователей -->
        <div class="section">
            <h2>Список пользователей</h2>
            <button onclick="loadUsers()">Обновить список</button>
            <div id="usersTable"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';

        function showResult(elementId, message, isSuccess) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.className = 'result ' + (isSuccess ? 'success' : 'error');
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        async function resetHWID() {
            const username = document.getElementById('resetUsername').value;
            const adminKey = document.getElementById('adminKey').value;

            if (!username || !adminKey) {
                showResult('resetResult', 'Заполните все поля', false);
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/admin/reset-hwid`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, admin_key: adminKey })
                });

                const data = await response.json();
                showResult('resetResult', data.message, data.success);
            } catch (error) {
                showResult('resetResult', 'Ошибка подключения к серверу', false);
            }
        }

        async function banUser() {
            const username = document.getElementById('banUsername').value;
            if (!username) {
                showResult('banResult', 'Введите username', false);
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/admin/ban-user`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, is_banned: 1 })
                });

                const data = await response.json();
                showResult('banResult', data.message || 'Пользователь забанен', data.success !== false);
                loadUsers();
            } catch (error) {
                showResult('banResult', 'Ошибка подключения к серверу', false);
            }
        }

        async function unbanUser() {
            const username = document.getElementById('banUsername').value;
            if (!username) {
                showResult('banResult', 'Введите username', false);
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/admin/ban-user`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, is_banned: 0 })
                });

                const data = await response.json();
                showResult('banResult', data.message || 'Пользователь разбанен', data.success !== false);
                loadUsers();
            } catch (error) {
                showResult('banResult', 'Ошибка подключения к серверу', false);
            }
        }

        async function addSubscription() {
            const username = document.getElementById('subUsername').value;
            const days = parseInt(document.getElementById('subDays').value);

            if (!username || !days) {
                showResult('subResult', 'Заполните все поля', false);
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/admin/set-subscription`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, days })
                });

                const data = await response.json();
                showResult('subResult', data.message || `Подписка добавлена на ${days} дней`, data.success !== false);
                loadUsers();
            } catch (error) {
                showResult('subResult', 'Ошибка подключения к серверу', false);
            }
        }

        async function removeSubscription() {
            const username = document.getElementById('subUsername').value;
            if (!username) {
                showResult('subResult', 'Введите username', false);
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/admin/set-subscription`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, days: 0 })
                });

                const data = await response.json();
                showResult('subResult', data.message || 'Подписка удалена', data.success !== false);
                loadUsers();
            } catch (error) {
                showResult('subResult', 'Ошибка подключения к серверу', false);
            }
        }

        async function loadUsers() {
            try {
                const response = await fetch(`${API_URL}/api/admin/users`);
                const data = await response.json();

                if (!data.success) {
                    document.getElementById('usersTable').innerHTML = '<p>Ошибка загрузки пользователей</p>';
                    return;
                }

                let html = '<table><thead><tr><th>ID</th><th>Username</th><th>HWID</th><th>Статус</th><th>Подписка до</th><th>Последний вход</th></tr></thead><tbody>';

                data.users.forEach(user => {
                    const status = user.is_banned ? '<span class="status-banned">Забанен</span>' : '<span class="status-active">Активен</span>';
                    const subEnd = user.subscription_end || 'Нет';
                    const lastLogin = user.last_login ? new Date(user.last_login).toLocaleString('ru-RU') : 'Никогда';
                    const hwid = user.hwid || 'Не привязан';

                    html += `<tr>
                        <td>${user.id}</td>
                        <td>${user.username}</td>
                        <td>${hwid}</td>
                        <td>${status}</td>
                        <td>${subEnd}</td>
                        <td>${lastLogin}</td>
                    </tr>`;
                });

                html += '</tbody></table>';
                document.getElementById('usersTable').innerHTML = html;
            } catch (error) {
                document.getElementById('usersTable').innerHTML = '<p>Ошибка подключения к серверу</p>';
            }
        }

        // Загружаем пользователей при открытии страницы
        loadUsers();
    </script>
</body>
</html>
