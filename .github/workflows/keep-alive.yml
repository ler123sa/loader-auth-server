name: 🚀 Keep Render Server Alive

# Когда запускать
on:
  schedule:
    # Каждые 10 минут: */10 * * * *
    # Формат: минуты часы день месяц день_недели
    - cron: '*/10 * * * *'
  
  # Можно запустить вручную из GitHub интерфейса
  workflow_dispatch:

# Задачи
jobs:
  keep-alive:
    name: 💓 Ping Server
    runs-on: ubuntu-latest  # Бесплатная Ubuntu машина
    
    steps:
      # Шаг 1: Информация о запуске
      - name: 📅 Show current time
        run: |
          echo "🕐 Current time: $(date)"
          echo "🌍 Timezone: $(timedatectl show --property=Timezone --value)"
      
      # Шаг 2: Основной пинг
      - name: 🏥 Health Check
        run: |
          echo "🚀 Pinging health endpoint..."
          
          # Отправляем запрос и сохраняем код ответа
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            --retry 2 \
            --retry-delay 5 \
            https://loader-auth-server.onrender.com/api/health)
          
          echo "📡 Response code: $response"
          
          # Проверяем результат
          if [ $response -eq 200 ]; then
            echo "✅ Server is healthy!"
          elif [ $response -eq 0 ]; then
            echo "⚠️ Server might be sleeping (timeout/connection error)"
            echo "🔄 Trying to wake up server..."
            
            # Дополнительные попытки разбудить сервер
            for i in {1..3}; do
              echo "🔄 Wake-up attempt $i/3..."
              curl -s --max-time 45 https://loader-auth-server.onrender.com/ || true
              sleep 15
            done
            
            # Финальная проверка
            final_response=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 30 https://loader-auth-server.onrender.com/api/health)
            echo "🏁 Final check: $final_response"
            
          else
            echo "❌ Unexpected response: $response"
          fi
      
      # Шаг 3: Дополнительный пинг интерфейсов
      - name: 🖥️ Check Interfaces
        run: |
          echo "🔍 Checking login interface..."
          login_response=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 20 \
            https://loader-auth-server.onrender.com/interface/login)
          echo "🔐 Login interface: $login_response"
          
          echo "🔍 Checking profile interface..."
          profile_response=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 20 \
            https://loader-auth-server.onrender.com/interface/profile)
          echo "👤 Profile interface: $profile_response"
      
      # Шаг 4: Статистика
      - name: 📊 Show Statistics
        run: |
          echo "📈 Keep-alive job completed!"
          echo "⏰ Next run: in 10 minutes"
          echo "🔄 Total GitHub Actions minutes used this month: Check your GitHub billing"
