name: Keep Server Alive (Multiple)

on:
  schedule:
    # Несколько расписаний для надежности
    - cron: '*/8 * * * *'   # Каждые 8 минут
    - cron: '2,12,22,32,42,52 * * * *'  # В 2, 12, 22, 32, 42, 52 минуты каждого часа
    - cron: '5,15,25,35,45,55 * * * *'  # В 5, 15, 25, 35, 45, 55 минут каждого часа
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Server
        run: |
          echo "🚀 Pinging at $(date)"
          response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://loader-auth-server.onrender.com/api/health)
          echo "📡 Response: $response"
          
          if [ $response -ne 200 ]; then
            echo "⚠️ Server might be sleeping, sending wake-up ping..."
            curl -s --max-time 45 https://loader-auth-server.onrender.com/ || true
          fi
